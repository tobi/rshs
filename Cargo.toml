[package]
name = "rshs"
version = "0.4.4"
description = "A lightweight HTTP + WebDAV file server"
license = "MIT"
repository = "https://github.com/mogeko/rshs"
keywords = ["http", "webdav", "file-server", "actix-web"]
categories = ["web-programming::http-server"]
edition = "2024"

[dependencies]
actix-web = { version = "4.13.0", features = ["rustls-0_23"] }
actix-web-httpauth = "0.8.2"
clap = { version = "4.6.1", features = ["derive", "env"] }
tokio = { version = "1.52.2", features = ["full"] }
dav-server = { version = "0.11.0", features = ["actix-compat"] }
mime_guess = "2.0.5"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "fmt"] }
tracing-actix-web = "0.7.21"
tracing-log = "0.2.0"
sha-crypt = { version = "0.6.0", features = ["getrandom"] }
rustls = "0.23.40"
rustls-pemfile = "2.2.0"
sha2 = "0.11"


[dev-dependencies]
tempfile = "3.27.0"
