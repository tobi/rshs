[package]
name = "rshs"
version = "0.3.0"
description = "A lightweight HTTP + WebDAV file server"
license = "MIT"
repository = "https://github.com/mogeko/rshs"
keywords = ["http", "webdav", "file-server", "actix-web"]
categories = ["web-programming::http-server"]
edition = "2024"

[dependencies]
actix-web = "4.13.0"
actix-web-httpauth = "0.8.2"
clap = { version = "4.6.1", features = ["derive", "env"] }
tokio = { version = "1.52.2", features = ["full"] }
dav-server = { version = "0.11.0", features = ["actix-compat"] }
mime_guess = "2.0.5"
log = "0.4.29"
env_logger = "0.11.10"
sha-crypt = "0.4.0"

[dev-dependencies]
tempfile = "3.27.0"
